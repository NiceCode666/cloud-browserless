services:
  chromium:
    # 钉在 Wayland 切默认（2026-03-31）之前最后一个 Selkies tag。
    # latest/ls26+ 上 pixelflux 走 Wayland 软件渲染路径，在 Docker Desktop (LinuxKit) 内核会 EOPNOTSUPP 崩溃。
    image: linuxserver/chromium:cc0cbc1c-ls25
    container_name: cloud-chromium
    security_opt:
      - seccomp:unconfined
    environment:
      PUID: 1000
      PGID: 1000
      TZ: "${TZ:-Asia/Shanghai}"
      # Web UI 登录凭据（从 .env 读取，避免明文写死）
      CUSTOM_USER: "${WEB_USER:-admin}"
      PASSWORD: "${WEB_PASSWORD:?WEB_PASSWORD is required in .env}"
      # --- 画质调优（可在 .env 里覆盖）---
      # 支持的 env 因镜像版本而异；以下几个是 selkies 常见且通用的
      DISPLAY_WIDTH:          "${DISPLAY_WIDTH:-1280}"
      DISPLAY_HEIGHT:         "${DISPLAY_HEIGHT:-720}"
      DISPLAY_DPI:            "${DISPLAY_DPI:-96}"
      SELKIES_FRAMERATE:      "${SELKIES_FRAMERATE:-30}"
      SELKIES_VIDEO_BITRATE:  "${SELKIES_VIDEO_BITRATE:-4000}"
      SELKIES_AUDIO_BITRATE:  "${SELKIES_AUDIO_BITRATE:-64000}"
      SELKIES_ENCODER:        "${SELKIES_ENCODER:-x264enc}"
      # --- Chromium 自身的 v8 堆上限（低内存环境防止 OOM 失控） ---
      CHROMIUM_JS_HEAP_MB:    "${CHROMIUM_JS_HEAP_MB:-512}"
      CHROMIUM_EXTRA_FLAGS:   "${CHROMIUM_EXTRA_FLAGS:-}"
    # 不直接对宿主开端口；只在内部 bridge `chromium-net` 上向 cdp-gateway 暴露。
    # 入口由 gateway 统一持有（TLS / token 鉴权都在那一侧）。
    expose:
      - "3000"   # selkies HTTP（Web UI 内部端口）
      - "9222"   # CDP（仅 chromium-net 可达，宿主不可达）
    networks:
      - chromium-net
    volumes:
      - ./chromium-config:/config
      # Chromium 用户档案单独挂载，方便备份/迁移；wrapped-chromium 已写死 --user-data-dir=/profile
      - ./chromium-profile:/profile
      # Plan A: 覆盖 autostart（X11 与 Wayland 两个版本），开机不强拉任何 App
      - ./chromium/autostart:/defaults/autostart:ro
      - ./chromium/autostart_wayland:/defaults/autostart_wayland:ro
      # 覆盖 chromium 包装器：任何方式打开 chromium 都自动带 CDP 参数
      - ./chromium/wrapped-chromium:/usr/bin/wrapped-chromium:ro
    # 资源上限，防止 chromium 失控时拖死宿主(sshd、docker daemon 等)
    # 低配机器(2C3.4G)默认 2g/1.5 核，留出 ~1.5G / 0.5 核 给系统
    mem_limit:   "${CHROMIUM_MEM_LIMIT:-2g}"
    cpus:        "${CHROMIUM_CPUS:-1.5}"
    shm_size:    "${CHROMIUM_SHM_SIZE:-1g}"
    restart: unless-stopped

  # CDP 中继：socat 旁车，与 chromium 共享 netns。
  # 起因：Chromium 130+ 出于安全考虑静默忽略 `--remote-debugging-address=0.0.0.0`，
  # CDP 实际只监听 127.0.0.1:9222。旁车在 chromium netns 内把 0.0.0.0:19222 -> 127.0.0.1:9222，
  # 让 cdp-gateway（独立 netns，走 chromium-net bridge）可以通过 chromium:19222 访问。
  cdp-relay:
    image: alpine/socat:latest
    container_name: cloud-chromium-cdp-relay
    network_mode: "service:chromium"
    command: TCP-LISTEN:19222,fork,reuseaddr TCP:127.0.0.1:9222
    depends_on:
      - chromium
    restart: unless-stopped

  # CDP 安全网关：TLS 终结 + token 前缀鉴权 + 唯一对外入口
  cdp-gateway:
    image: nginx:alpine
    container_name: cloud-chromium-gateway
    networks:
      - chromium-net
    ports:
      # Web UI：外部 HTTPS ${WEB_PORT} -> gateway TLS(3443) -> chromium:3000
      - "${WEB_PORT:-3000}:3443"
      # CDP 网关：外部 HTTP ${CDP_PORT} -> gateway nginx(9443) -> chromium:9222
      - "${CDP_PORT:-9222}:9443"
      # CDP 明文入口，仅绑宿主 loopback，只能通过 SSH 隧道访问；公网不可达
      - "127.0.0.1:9223:9080"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./gateway/certs:/etc/nginx/certs:ro
    depends_on:
      - chromium
    # 网关很轻，给点上限足以
    mem_limit: "${GATEWAY_MEM_LIMIT:-128m}"
    restart: unless-stopped

# Chromium 与 gateway 走专属 bridge 网络，gateway 通过 DNS 名 `chromium` 访问。
# 这样 chromium 重启 / 重建都不影响 gateway —— 没有共享 netns 的脆弱耦合。
networks:
  chromium-net:
    driver: bridge
